<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Project Hub</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        color: white;
        background: radial-gradient(circle at top, #0f2027, #090a0f);
      }

      /* 🌌 별 배경 */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      /* 중앙 컨테이너 */
      .container {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* 제목 */
      h1 {
        font-size: 40px;
        margin-bottom: 10px;
        text-shadow: 0 0 20px #00ffff;
      }

      .subtitle {
        margin-bottom: 50px;
        color: #ccc;
      }

      /* 카드 영역 */
      .card-container {
        display: flex;
        gap: 30px;
      }

      /* 카드 */
      .card {
        width: 220px;
        height: 280px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        text-align: center;
        padding: 20px;
        cursor: pointer;
        transition: 0.4s;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 0 25px #00ffff;
      }

      /* 아이콘 */
      .icon {
        font-size: 60px;
        margin-bottom: 20px;
      }

      /* 버튼 */
      .btn {
        margin-top: 20px;
        padding: 10px 15px;
        background: linear-gradient(45deg, #6c5ce7, #00cec9);
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }

      .btn:hover {
        box-shadow: 0 0 15px #00cec9;
      }

      /* 반응형 */
      @media (max-width: 600px) {
        .card-container {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="stars"></canvas>

    <div class="container">
      <h1>🌌 My Project Hub</h1>
      <p class="subtitle">내가 만든 웹 프로젝트 모음</p>

      <div class="card-container">
        <!-- 패스트오더 -->
        <div class="card" onclick="goTo('fastorder.html')">
          <div class="icon">🍔</div>
          <h2>패스트오더</h2>
          <p>카페 주문 UI 프로젝트</p>
          <button class="btn">보러가기</button>
        </div>

        <!-- 플레이리스트 -->
        <div class="card" onclick="goTo('playlist.html')">
          <div class="icon">🎧</div>
          <h2>플레이리스트</h2>
          <p>우주 테마 음악 소개</p>
          <button class="btn">보러가기</button>
        </div>
      </div>
    </div>

    <script>
      /* 🚀 페이지 이동 */
      function goTo(page) {
        window.location.href = page;
      }

      /* 🌌 별 애니메이션 */
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let stars = [];

      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2,
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";

        stars.forEach((s) => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();

          s.y += 0.2;
          if (s.y > canvas.height) s.y = 0;
        });

        requestAnimationFrame(draw);
      }

      draw();
    </script>
  </body>
</html>
