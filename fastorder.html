<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>명지 패스트오더</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f3f1ed;
        padding: 20px;
      }

      .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
      }

      h1 {
        text-align: center;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .title {
        font-weight: bold;
        margin-bottom: 10px;
        display: block;
      }

      .drink-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .drink-card {
        width: 120px;
        height: 150px;
        border: 2px solid #ccc;
        border-radius: 10px;
        padding: 10px;
        cursor: pointer;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;
      }

      .drink-card img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        margin-bottom: 8px;
      }

      input[type="radio"]:checked + .drink-card {
        border-color: #6b4f4f;
        background-color: #f0e6e6;
      }

      .drink-option {
        display: none;
      }

      .option-row {
        display: flex;
        gap: 20px;
        justify-content: left;
      }

      .option-item {
        flex-direction: column;
        align-items: left;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #6b4f4f;
        color: white;
        border: none;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🍔 명지 패스트오더</h1>

      <form>
        <div class="form-group">
          <span class="title">닉네임</span>
          <input type="text" placeholder="닉네임 입력" required />
        </div>

        <div class="form-group">
          <span class="title">음료 선택</span>

          <div class="drink-container">
            <label>
              <input type="radio" name="drink" class="drink-option" />
              <div class="drink-card">
                <img src="imges/aa.jpg" alt="" width="100" />아메리카노
              </div>
            </label>

            <label>
              <input type="radio" name="drink" class="drink-option" />
              <div class="drink-card">
                <img src="imges/cl.jpg" alt="" width="100" />카페라떼
              </div>
            </label>

            <label>
              <input type="radio" name="drink" class="drink-option" />
              <div class="drink-card">
                <img src="imges/pt.jpg" alt="" width="100" />복숭아티
              </div>
            </label>

            <label>
              <input type="radio" name="drink" class="drink-option" />
              <div class="drink-card">
                <img src="imges/ckl.jpg" alt="" width="100" />초코라떼
              </div>
            </label>

            <label>
              <input type="radio" name="drink" class="drink-option" />
              <div class="drink-card">
                <img src="imges/ss.png" alt="" width="100" />딸기스무디
              </div>
            </label>
          </div>
        </div>

        <div class="form-group">
          <span class="title">온도</span>
          <div class="option-row">
            <label class="option-item">
              <input type="radio" name="temp" /><span>HOT</span>
            </label>
            <label class="option-item">
              <input type="radio" name="temp" /><span>ICE</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <span class="title">사이즈</span>
          <div class="option-row">
            <label class="option-item">
              <input type="radio" name="size" /><span>S</span>
            </label>
            <label class="option-item">
              <input type="radio" name="size" /><span>M</span>
            </label>
            <label class="option-item">
              <input type="radio" name="size" /><span>L</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <span class="title">추가 옵션</span>
          <div class="option-row">
            <label class="option-item">
              <input type="checkbox" /><span>샷 추가</span>
            </label>
            <label class="option-item">
              <input type="checkbox" /><span>휘핑</span>
            </label>
            <label class="option-item">
              <input type="checkbox" /><span>시럽</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <span class="title">수령 시간</span>
          <select required>
            <option value="">선택하세요</option>
            <option>5분 후</option>
            <option>10분 후</option>
            <option>15분 후</option>
          </select>
        </div>

        <button type="submit">주문하기</button>
      </form>
    </div>

    <script>
      const radios = document.querySelectorAll('input[type="radio"]');

      radios.forEach((radio) => {
        radio.addEventListener("click", function () {
          if (this.checked && this.dataset.checked === "true") {
            this.checked = false;
            this.dataset.checked = "false";
          } else {
            document
              .querySelectorAll(`input[name="${this.name}"]`)
              .forEach((r) => (r.dataset.checked = "false"));
            this.dataset.checked = "true";
          }
        });
      });
    </script>
  </body>
</html>
