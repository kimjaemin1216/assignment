<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Project Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #02091a;
  color: #ddeeff;
  font-family: 'Noto Serif KR', serif;
}

/* 씬 캔버스 (배경 + 씬 전부 하나로) */
#scene {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* UI */
.ui {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 2vh 4vw;
}

/* 헤더 */
.hd {
  text-align: center;
  margin-bottom: clamp(16px, 2.8vh, 40px);
  animation: fadeD 1.2s ease both;
}
.hd h1 {
  font-family: 'Crimson Pro', serif;
  font-weight: 300; font-style: italic;
  font-size: clamp(22px, 4vw, 56px);
  letter-spacing: 0.12em;
  color: #eef2ff;
  text-shadow:
    0 0 28px rgba(160,210,255,.65),
    0 0 65px rgba(100,170,230,.30);
  white-space: nowrap;
}
.hd p {
  margin-top: 0.5vh;
  font-size: clamp(9px, 1vw, 13px);
  color: #6a9abf;
  letter-spacing: 0.45em;
}

/* 카드 그리드 — 모든 화면 대응 */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(8px, 1.5vw, 20px);
  width: min(92vw, 940px);
  animation: fadeU 1.2s .28s ease both;
}
.card {
  background: rgba(6,22,50,0.62);
  border: 1px solid rgba(168,200,232,0.20);
  border-radius: clamp(10px, 1.2vw, 18px);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: clamp(12px, 2vh, 28px) clamp(8px, 1.2vw, 20px) clamp(10px, 1.6vh, 22px);
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  height: clamp(160px, 22vh, 265px);
  position: relative; overflow: hidden;
  transition: transform .4s cubic-bezier(.23,1,.32,1),
              border-color .35s, box-shadow .35s;
}
.card::before {
  content: ''; position: absolute; inset: 0;
  border-radius: inherit; pointer-events: none;
  background: linear-gradient(145deg,rgba(180,220,255,.06) 0%,transparent 55%);
}
.card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg,transparent,rgba(168,210,248,.5),transparent);
  border-radius: 0 0 18px 18px;
  opacity: 0; transition: opacity .35s;
}
.card:hover {
  transform: translateY(-10px) scale(1.03);
  border-color: rgba(168,210,248,.46);
  box-shadow:
    0 18px 50px rgba(0,15,50,.78),
    0 0 28px rgba(100,168,228,.22),
    inset 0 1px 0 rgba(255,255,255,.07);
}
.card:hover::after { opacity: 1; }
.icon {
  font-size: clamp(26px, 3.5vw, 46px);
  line-height: 1;
  filter: drop-shadow(0 2px 10px rgba(0,0,0,.45));
  transition: transform .4s cubic-bezier(.23,1,.32,1);
}
.card:hover .icon { transform: scale(1.14) translateY(-4px); }
.card-txt { text-align: center; }
.card-txt h2 {
  font-size: clamp(11px, 1.4vw, 17px);
  font-weight: 600; color: #eef2ff;
  margin-bottom: 4px; letter-spacing: .04em;
}
.card-txt p {
  font-size: clamp(8.5px, 0.9vw, 12px);
  color: #6a9abf; line-height: 1.6;
}
.btn {
  padding: clamp(5px, .8vh, 9px) clamp(10px, 1.5vw, 22px);
  background: transparent;
  border: 1px solid rgba(168,210,248,.28);
  border-radius: 50px;
  color: #a8c8e8;
  font-size: clamp(8.5px, 0.9vw, 12px);
  font-family: 'Noto Serif KR', serif;
  letter-spacing: .18em; cursor: pointer;
  transition: all .3s; white-space: nowrap;
}
.btn:hover, .card:hover .btn {
  background: rgba(168,210,248,.11);
  border-color: rgba(168,210,248,.62);
  color: #c8e4f8;
  box-shadow: 0 0 18px rgba(100,178,238,.18);
}

@keyframes fadeD { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:none} }
@keyframes fadeU { from{opacity:0;transform:translateY(24px)}  to{opacity:1;transform:none} }

/* 반응형 그리드 */
@media (max-width: 650px) {
  .grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 340px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div class="ui">
  <header class="hd">
    <h1>✦ My Project Hub ✦</h1>
    <p>내가 만든 웹 프로젝트 모음</p>
  </header>
  <div class="grid">
    <div class="card" onclick="goTo('fastorder.html')">
      <div class="icon">🍔</div>
      <div class="card-txt"><h2>패스트오더</h2><p>카페 주문 UI 프로젝트</p></div>
      <button class="btn">보러가기</button>
    </div>
    <div class="card" onclick="goTo('playlist.html')">
      <div class="icon">🎧</div>
      <div class="card-txt"><h2>플레이리스트</h2><p>우주 테마 음악 소개</p></div>
      <button class="btn">보러가기</button>
    </div>
    <div class="card" onclick="goTo('bucketlist.html')">
      <div class="icon">✨</div>
      <div class="card-txt"><h2>버킷리스트</h2><p>우리팀 버킷리스트</p></div>
      <button class="btn">보러가기</button>
    </div>
    <div class="card" onclick="goTo('tierlist.html')">
      <div class="icon">🏆</div>
      <div class="card-txt"><h2>티어리스트</h2><p>학교 근처 맛집 티어</p></div>
      <button class="btn">보러가기</button>
    </div>
    <div class="card" onclick="goTo('magazine.html')">
      <div class="icon">🎬</div>
      <div class="card-txt"><h2>나의 매거진</h2><p>인생 영화 추천</p></div>
      <button class="btn">보러가기</button>
    </div>
  </div>
</div>

<script>
'use strict';
function goTo(p){ window.location.href = p; }

const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');

/* ─────────────────────────────────────────
   유틸
───────────────────────────────────────── */
let W = 0, H = 0;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 값이 화면 비율과 무관하게 항상 올바른 위치에 오도록
// 모든 좌표를 W, H의 비율로 계산
const px = (rx) => rx * W;   // 0~1 → 실제 px (가로)
const py = (ry) => ry * H;   // 0~1 → 실제 px (세로)

/* ─────────────────────────────────────────
   눈송이 파티클
───────────────────────────────────────── */
function makeFlakes(n, rMin, rMax, sMin, sMax){
  return Array.from({length:n}, () => ({
    x:     Math.random(),
    y:     Math.random(),
    r:     Math.random() * (rMax - rMin) + rMin,
    speed: Math.random() * (sMax - sMin) + sMin,
    drift: (Math.random() - 0.5) * 0.00040,
    swing: Math.random() * Math.PI * 2,
    ss:    Math.random() * 0.017 + 0.004,
    a:     Math.random() * 0.52 + 0.30
  }));
}
const FLAKES = [
  ...makeFlakes(85,  2.2, 4.2, 0.00082, 0.00150),
  ...makeFlakes(125, 1.1, 2.4, 0.00046, 0.00082),
  ...makeFlakes(140, 0.3, 1.2, 0.00018, 0.00046),
];

/* ─────────────────────────────────────────
   별 파티클
───────────────────────────────────────── */
const STARS = Array.from({length:170}, () => ({
  x:  Math.random(),
  y:  Math.random() * 0.82,
  r:  Math.random() * 1.5 + 0.28,
  a:  Math.random(),
  da: (Math.random() - 0.5) * 0.007
}));

/* ─────────────────────────────────────────
   굴뚝 연기 파티클
───────────────────────────────────────── */
const SMOKE = Array.from({length:8}, (_, i) => ({
  life: i * 0.14,
  x: 0, y: 0,
  r: 0
}));
let smokeT = 0;

/* ─────────────────────────────────────────
   달 (오른쪽 상단, 화면 기준 %)
───────────────────────────────────────── */
function drawMoon(){
  // 달 중심: 오른쪽에서 14%, 위에서 14% (어떤 비율에도 잘림 없음)
  const mx = W * 0.86;
  const my = H * 0.14;
  const mr = Math.min(W, H) * 0.072;  // 달 반지름 (화면 작은 변의 7.2%)

  // ── 큰 후광 ──
  const halo2 = ctx.createRadialGradient(mx, my, mr * 0.8, mx, my, mr * 3.2);
  halo2.addColorStop(0,   'rgba(192,220,255,0.00)');
  halo2.addColorStop(0.3, 'rgba(192,220,255,0.13)');
  halo2.addColorStop(1,   'rgba(72,120,176,0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 3.2, 0, Math.PI * 2);
  ctx.fillStyle = halo2;
  ctx.fill();

  // ── 작은 후광 ──
  const halo1 = ctx.createRadialGradient(mx, my, mr * 0.9, mx, my, mr * 1.8);
  halo1.addColorStop(0,   'rgba(192,220,255,0.18)');
  halo1.addColorStop(1,   'rgba(136,174,212,0)');
  ctx.beginPath();
  ctx.arc(mx, my, mr * 1.8, 0, Math.PI * 2);
  ctx.fillStyle = halo1;
  ctx.fill();

  // ── 달 본체 ──
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = '#e6eefb';
  ctx.fill();

  // ── 크레이터 + 초승달 그림자 (clipPath 역할: save/restore + clip) ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.clip();

  // 크레이터
  const craters = [
    { ox: -0.22, oy: -0.20, r: 0.14 },
    { ox:  0.26, oy:  0.11, r: 0.09 },
    { ox: -0.06, oy:  0.26, r: 0.11 },
    { ox:  0.36, oy: -0.20, r: 0.07 },
  ];
  craters.forEach(c => {
    ctx.beginPath();
    ctx.arc(mx + c.ox * mr * 2, my + c.oy * mr * 2, c.r * mr * 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,200,230,0.40)';
    ctx.fill();
  });

  // 초승달 그림자 (달 원 안쪽에만)
  ctx.beginPath();
  ctx.arc(mx + mr * 0.54, my - mr * 0.10, mr * 0.94, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(2,9,26,0.50)';
  ctx.fill();

  ctx.restore();

  // ── 달 테두리 ──
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(182,210,246,0.38)';
  ctx.lineWidth = mr * 0.022;
  ctx.stroke();
}

/* ─────────────────────────────────────────
   산 (뒤 한 겹)
───────────────────────────────────────── */
function drawMountain(){
  // 산은 화면 너비 전체를 커버하고, 높이의 45~85% 구간에 위치
  const pts = [
    [0.00, 0.86], [0.08, 0.72], [0.14, 0.79],
    [0.22, 0.62], [0.30, 0.74], [0.38, 0.58],
    [0.47, 0.70], [0.57, 0.52], [0.66, 0.64],
    [0.75, 0.48], [0.84, 0.60], [0.94, 0.54],
    [1.00, 0.62], [1.00, 1.00], [0.00, 1.00],
  ];
  ctx.beginPath();
  ctx.moveTo(px(pts[0][0]), py(pts[0][1]));
  for(let i = 1; i < pts.length; i++){
    ctx.lineTo(px(pts[i][0]), py(pts[i][1]));
  }
  ctx.closePath();
  ctx.fillStyle = '#081624';
  ctx.fill();
}

/* ─────────────────────────────────────────
   소나무 (화면 양쪽)
   sx, sy = 나무 뿌리 중심 (비율), sh = 높이 비율
───────────────────────────────────────── */
function drawPine(sx, sy, sh, layers){
  // sh = 전체 높이(H 기준 비율)
  const bx = px(sx), by = py(sy);
  const th = py(sh);          // 전체 높이 px
  const trunkW = th * 0.055;
  const trunkH = th * 0.18;

  // 트렁크
  ctx.fillStyle = '#040c18';
  ctx.fillRect(bx - trunkW / 2, by - trunkH, trunkW, trunkH);

  // 층 (아래→위)
  const layerCount = layers || 3;
  for(let l = 0; l < layerCount; l++){
    const t = l / (layerCount - 1);           // 0=아래, 1=위
    const layerY  = by - trunkH - t * (th - trunkH);
    const layerW  = th * (0.38 - t * 0.18);  // 위로 갈수록 좁아짐
    const layerH  = th * (0.22 + t * 0.04);  // 높이

    // 어두운 삼각형
    ctx.beginPath();
    ctx.moveTo(bx - layerW, layerY);
    ctx.lineTo(bx, layerY - layerH);
    ctx.lineTo(bx + layerW, layerY);
    ctx.closePath();
    ctx.fillStyle = '#06121e';
    ctx.fill();
    // 약간 밝은 앞면
    ctx.beginPath();
    ctx.moveTo(bx - layerW * 0.85, layerY);
    ctx.lineTo(bx, layerY - layerH);
    ctx.lineTo(bx + layerW * 0.85, layerY);
    ctx.closePath();
    ctx.fillStyle = '#07141f';
    ctx.fill();

    // 눈 (위쪽 가장자리)
    ctx.beginPath();
    ctx.moveTo(bx - layerW, layerY);
    // 살짝 구불구불한 눈 곡선
    ctx.bezierCurveTo(
      bx - layerW * 0.5, layerY - th * 0.025,
      bx + layerW * 0.5, layerY - th * 0.025,
      bx + layerW, layerY
    );
    ctx.strokeStyle = 'rgba(168,208,242,0.88)';
    ctx.lineWidth   = Math.max(1.5, th * 0.018);
    ctx.lineCap     = 'round';
    ctx.stroke();
  }
}

function drawTrees(){
  // 왼쪽 나무 3그루
  drawPine(0.076, 0.90, 0.155, 3);
  drawPine(0.154, 0.90, 0.130, 3);
  drawPine(0.024, 0.92, 0.100, 2);
  // 오른쪽 나무 3그루
  drawPine(0.924, 0.90, 0.155, 3);
  drawPine(0.846, 0.90, 0.130, 3);
  drawPine(0.976, 0.92, 0.100, 2);
}

/* ─────────────────────────────────────────
   집 (개선된 디자인)
   - 본관 + 오른쪽 측면 날개동
   - 급경사 박공지붕 (Gothic 스타일)
   - 1층/2층 창문 구분
   - 벽 패널 라인으로 입체감
───────────────────────────────────────── */
function drawHouse(){
  const groundY = H * 0.88;
  const s       = Math.min(W, H);          // 기준 크기

  // ── 치수 ──
  const mainW = s * 0.130;                 // 본관 너비
  const mainH = s * 0.190;                 // 본관 높이
  const wingW = s * 0.060;                 // 날개동 너비
  const wingH = s * 0.130;                 // 날개동 높이

  // 본관 왼쪽 가장자리 x
  const hx  = W * 0.175;
  const hy  = groundY - mainH;            // 본관 지붕선 y
  const mcx = hx + mainW / 2;             // 본관 중앙 x

  // 날개동 (본관 오른쪽에 붙음)
  const wx  = hx + mainW;                 // 날개동 왼쪽 x
  const wy  = groundY - wingH;            // 날개동 지붕선 y
  const wcx = wx + wingW / 2;

  // 굴뚝: 본관 지붕 오른쪽 1/3 위
  const chimW  = s * 0.018;
  const chimH  = s * 0.075;
  const chimX  = mcx + mainW * 0.18;
  const chimY  = hy - mainH * 0.28;       // 지붕 경사 위

  // 창문 크기
  const wW  = mainW * 0.24,  wH  = mainH * 0.17;  // 본관 창문
  const wwW = wingW * 0.45,  wwH = wingH * 0.20;  // 날개동 창문

  // ── 창문 빛 후광 먼저 ──
  const winGlow = (wx2, wy2, rr) => {
    const g = ctx.createRadialGradient(wx2, wy2, 0, wx2, wy2, rr * 3.0);
    g.addColorStop(0,   'rgba(255,180,40,0.50)');
    g.addColorStop(1,   'rgba(255,180,40,0)');
    ctx.beginPath();
    ctx.arc(wx2, wy2, rr * 3.0, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  };
  // 본관 2층 창문 2개
  const w1x = hx + mainW * 0.22, w1y = hy + mainH * 0.28;
  const w2x = hx + mainW * 0.72, w2y = hy + mainH * 0.28;
  // 본관 1층 창문 2개
  const w3x = hx + mainW * 0.22, w3y = hy + mainH * 0.65;
  const w4x = hx + mainW * 0.72, w4y = hy + mainH * 0.65;
  // 날개동 창문
  const ww1x = wcx, ww1y = wy + wingH * 0.38;

  winGlow(w1x, w1y, wW * 0.55);
  winGlow(w2x, w2y, wW * 0.55);
  winGlow(w3x, w3y, wW * 0.55);
  winGlow(w4x, w4y, wW * 0.55);
  winGlow(ww1x, ww1y, wwW * 0.7);

  // ── 날개동 본체 ──
  ctx.fillStyle   = '#0c1c2c';
  ctx.strokeStyle = '#182a3c';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.rect(wx, wy, wingW, wingH);
  ctx.fill(); ctx.stroke();

  // 날개동 수평 패널 라인 (2층 구분)
  ctx.strokeStyle = 'rgba(30,50,72,0.80)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(wx, wy + wingH * 0.52);
  ctx.lineTo(wx + wingW, wy + wingH * 0.52);
  ctx.stroke();

  // ── 본관 본체 ──
  ctx.fillStyle   = '#0e1e30';
  ctx.strokeStyle = '#1a2e42';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.rect(hx, hy, mainW, mainH);
  ctx.fill(); ctx.stroke();

  // 본관 수평 패널 라인 (1층/2층 구분선)
  ctx.strokeStyle = 'rgba(30,52,76,0.75)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(hx, hy + mainH * 0.48);
  ctx.lineTo(hx + mainW, hy + mainH * 0.48);
  ctx.stroke();

  // 본관 수직 패널 라인 (중앙)
  ctx.beginPath();
  ctx.moveTo(mcx, hy + mainH * 0.48);
  ctx.lineTo(mcx, groundY);
  ctx.stroke();

  // ── 날개동 지붕 (낮은 박공) ──
  ctx.beginPath();
  ctx.moveTo(wx  - wingW * 0.08, wy);
  ctx.lineTo(wcx, wy - wingH * 0.42);
  ctx.lineTo(wx  + wingW * 1.08, wy);
  ctx.closePath();
  ctx.fillStyle   = '#060d1a';
  ctx.strokeStyle = '#10202e';
  ctx.lineWidth   = 1;
  ctx.fill(); ctx.stroke();

  // ── 본관 지붕 (급경사 박공) ──
  ctx.beginPath();
  ctx.moveTo(hx  - mainW * 0.08, hy);
  ctx.lineTo(mcx, hy - mainH * 0.55);   // 더 뾰족하게
  ctx.lineTo(hx  + mainW * 1.08, hy);
  ctx.closePath();
  ctx.fillStyle   = '#070e1c';
  ctx.strokeStyle = '#122030';
  ctx.lineWidth   = 1;
  ctx.fill(); ctx.stroke();

  // 본관 지붕 중앙 장식 (작은 삼각 돌출)
  ctx.beginPath();
  ctx.moveTo(mcx - mainW * 0.14, hy - mainH * 0.10);
  ctx.lineTo(mcx, hy - mainH * 0.30);
  ctx.lineTo(mcx + mainW * 0.14, hy - mainH * 0.10);
  ctx.closePath();
  ctx.fillStyle   = '#060c18';
  ctx.strokeStyle = '#102030';
  ctx.lineWidth   = 1;
  ctx.fill(); ctx.stroke();

  // ── 굴뚝 ──
  ctx.fillStyle   = '#060c18';
  ctx.strokeStyle = '#0e1c28';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.rect(chimX - chimW / 2, chimY, chimW, chimH);
  ctx.fill(); ctx.stroke();
  // 굴뚝 테두리 (약간 넓게)
  ctx.strokeStyle = '#182436';
  ctx.beginPath();
  ctx.rect(chimX - chimW / 2 - 1, chimY - 1, chimW + 2, chimH * 0.12);
  ctx.stroke();
  // 굴뚝 눈 모자
  ctx.fillStyle = 'rgba(172,210,240,0.85)';
  ctx.beginPath();
  ctx.roundRect(chimX - chimW * 0.8, chimY, chimW * 1.6, chimH * 0.10, 2);
  ctx.fill();

  // ── 창문 그리기 함수 ──
  const drawWin = (wx2, wy2, ww2, wh2, arch) => {
    // 창문 틀 + 내부 빛
    ctx.fillStyle   = '#ffb420';
    ctx.globalAlpha = 0.92;
    ctx.beginPath();
    if(arch){
      // 아치형 창문 (상단 반원)
      const r = ww2 / 2;
      ctx.moveTo(wx2 - ww2/2, wy2 + wh2/2);
      ctx.lineTo(wx2 - ww2/2, wy2 - wh2/2 + r);
      ctx.arc(wx2, wy2 - wh2/2 + r, r, Math.PI, 0);
      ctx.lineTo(wx2 + ww2/2, wy2 + wh2/2);
      ctx.closePath();
    } else {
      ctx.roundRect(wx2 - ww2/2, wy2 - wh2/2, ww2, wh2, 2);
    }
    ctx.fill();
    ctx.fillStyle   = '#ffe880';
    ctx.globalAlpha = 0.18;
    ctx.fill();
    ctx.globalAlpha = 1;
    // 창문 틀 선
    ctx.strokeStyle = 'rgba(100,58,0,0.45)';
    ctx.lineWidth   = Math.max(0.8, ww2 * 0.04);
    ctx.beginPath();
    ctx.moveTo(wx2, wy2 - wh2/2); ctx.lineTo(wx2, wy2 + wh2/2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(wx2 - ww2/2, wy2); ctx.lineTo(wx2 + ww2/2, wy2); ctx.stroke();
  };

  // 본관 2층 창문 (아치형)
  drawWin(w1x, w1y, wW, wH, true);
  drawWin(w2x, w2y, wW, wH, true);
  // 본관 1층 창문 (사각)
  drawWin(w3x, w3y, wW, wH * 0.95, false);
  drawWin(w4x, w4y, wW, wH * 0.95, false);
  // 날개동 창문 (아치형, 작게)
  drawWin(ww1x, ww1y, wwW, wwH, true);

  // ── 문 (본관 중앙, 아치형) ──
  const doorW = mainW * 0.26, doorH = mainH * 0.26;
  const doorX = mcx, doorY2 = groundY - doorH * 0.88;
  ctx.fillStyle   = '#060c18';
  ctx.strokeStyle = '#0e1c28';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(doorX - doorW/2, groundY);
  ctx.lineTo(doorX - doorW/2, doorY2);
  ctx.arc(doorX, doorY2, doorW/2, Math.PI, 0);
  ctx.lineTo(doorX + doorW/2, groundY);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 문 손잡이
  ctx.beginPath();
  ctx.arc(doorX + doorW * 0.28, groundY - doorH * 0.38, doorW * 0.05, 0, Math.PI * 2);
  ctx.fillStyle = '#1e3448';
  ctx.fill();

  // ── 지붕 눈 ──
  const drawRoofSnow = (pts, lw) => {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for(let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.strokeStyle = 'rgba(208,236,255,0.93)';
    ctx.lineWidth   = Math.max(2.5, lw);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.restore();
  };
  // 본관 지붕 눈
  drawRoofSnow([
    [hx - mainW*0.08, hy],
    [mcx, hy - mainH*0.55],
    [hx + mainW*1.08, hy]
  ], mainH * 0.042);
  // 본관 중앙 장식 눈
  drawRoofSnow([
    [mcx - mainW*0.14, hy - mainH*0.10],
    [mcx, hy - mainH*0.30],
    [mcx + mainW*0.14, hy - mainH*0.10]
  ], mainH * 0.030);
  // 날개동 지붕 눈
  drawRoofSnow([
    [wx - wingW*0.08, wy],
    [wcx, wy - wingH*0.42],
    [wx + wingW*1.08, wy]
  ], wingH * 0.045);

  // ── 고드름 (본관 처마 + 날개동 처마) ──
  const drawIcicles = (fromX, toX, roofY) => {
    ctx.strokeStyle = 'rgba(148,196,238,0.60)';
    ctx.lineCap = 'round';
    const step = (toX - fromX) / 9;
    for(let ix = fromX + step * 0.3; ix < toX; ix += step){
      const len = mainH * (0.055 + (Math.sin(ix * 0.5) * 0.5 + 0.5) * 0.028);
      ctx.lineWidth = Math.max(1.0, step * 0.14);
      ctx.beginPath();
      ctx.moveTo(ix, roofY);
      ctx.lineTo(ix, roofY + len);
      ctx.stroke();
    }
  };
  drawIcicles(hx - mainW*0.08, hx + mainW*1.08, hy);
  drawIcicles(wx - wingW*0.08, wx + wingW*1.08, wy);

  // ── 굴뚝 연기 ──
  SMOKE.forEach((sm, i) => {
    const life  = ((smokeT * 0.12 + i * 0.13) % 1.0);
    const sx2   = chimX + Math.sin(life * 4.5 + i * 1.2) * mainW * 0.14;
    const sy2   = chimY - life * mainH * 0.52;
    const sr    = chimW * 0.9 + life * chimW * 2.0;
    const alpha = Math.max(0, 0.52 - life * 0.68);
    if(alpha <= 0) return;
    ctx.beginPath();
    ctx.arc(sx2, sy2, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(44,68,96,${alpha.toFixed(2)})`;
    ctx.fill();
  });
}

/* ─────────────────────────────────────────
   쌓인 눈 지면 (3겹)
   화면 높이 기준으로 비율 계산
───────────────────────────────────────── */
function drawGround(){
  // 겹 1 (가장 뒤, 약간 투명)
  ctx.beginPath();
  ctx.moveTo(0, H * 0.870);
  for(let x = 0; x <= W; x += W / 24){
    const phase = x / W;
    const y = H * (0.870 + Math.sin(phase * Math.PI * 3.1 + 0.8) * 0.012
                         - Math.sin(phase * Math.PI * 1.7 + 2.1) * 0.007);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(138,178,208,0.70)';
  ctx.fill();

  // 겹 2
  ctx.beginPath();
  ctx.moveTo(0, H * 0.890);
  for(let x = 0; x <= W; x += W / 24){
    const phase = x / W;
    const y = H * (0.890 + Math.sin(phase * Math.PI * 2.7 + 1.4) * 0.010
                         - Math.sin(phase * Math.PI * 1.3 + 0.5) * 0.006);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(184,212,238,0.90)';
  ctx.fill();

  // 겹 3 (가장 앞, 흰색에 가깝게)
  ctx.beginPath();
  ctx.moveTo(0, H * 0.907);
  for(let x = 0; x <= W; x += W / 24){
    const phase = x / W;
    const y = H * (0.907 + Math.sin(phase * Math.PI * 2.2 + 0.2) * 0.008
                         + Math.sin(phase * Math.PI * 3.8 + 1.8) * 0.004);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = '#d8eeff';
  ctx.fill();
}

/* ─────────────────────────────────────────
   호수 (얼어붙은 느낌)
───────────────────────────────────────── */
function drawLake(){
  const lx = W * 0.50;           // 중앙
  const ly = H * 0.900;          // 지면 안쪽 (눈 아래)
  const lrx = W * 0.270;         // 가로 반지름
  const lry = H * 0.028;         // 세로 반지름 (납작하게)

  // 호수 본체
  const lakeGrad = ctx.createRadialGradient(lx, ly - lry * 0.4, 0, lx, ly, lrx);
  lakeGrad.addColorStop(0,   '#1c4472');
  lakeGrad.addColorStop(1,   '#0a1c38');
  ctx.beginPath();
  ctx.ellipse(lx, ly, lrx, lry, 0, 0, Math.PI * 2);
  ctx.fillStyle = lakeGrad;
  ctx.fill();

  // 하이라이트 (달 반사)
  ctx.beginPath();
  ctx.ellipse(lx + W * 0.02, ly - lry * 0.3, lrx * 0.30, lry * 0.38, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(184,216,248,0.10)';
  ctx.fill();

  // 균열선
  ctx.strokeStyle = 'rgba(24,64,112,0.55)';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  [[-.22, -.2, .02, .1], [.10, .1, .28, -.15], [-.08, .3, .18, .28]].forEach(([ax,ay,bx,by]) => {
    ctx.beginPath();
    ctx.moveTo(lx + ax * lrx, ly + ay * lry);
    ctx.lineTo(lx + bx * lrx, ly + by * lry);
    ctx.stroke();
  });

  // 테두리
  ctx.beginPath();
  ctx.ellipse(lx, ly, lrx, lry, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(36,78,144,0.32)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

/* ─────────────────────────────────────────
   별 (canvas)
───────────────────────────────────────── */
function drawStars(){
  STARS.forEach(s => {
    s.a += s.da;
    if(s.a > 1 || s.a < 0.12) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,224,255,${s.a.toFixed(2)})`;
    ctx.fill();
  });
}

/* ─────────────────────────────────────────
   눈송이
───────────────────────────────────────── */
function drawSnow(){
  FLAKES.forEach(f => {
    f.swing += f.ss;
    f.y     += f.speed;
    f.x     += Math.sin(f.swing) * f.drift;
    if(f.y > 1){ f.y = -0.02; f.x = Math.random(); }
    if(f.x < 0) f.x = 1;
    if(f.x > 1) f.x = 0;
    ctx.beginPath();
    ctx.arc(f.x * W, f.y * H, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(215,238,255,${f.a.toFixed(2)})`;
    ctx.fill();
  });
}

/* ─────────────────────────────────────────
   메인 루프
───────────────────────────────────────── */
function frame(){
  smokeT += 0.013;

  // 하늘 배경
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0,   '#020914');
  skyGrad.addColorStop(0.5, '#02091a');
  skyGrad.addColorStop(1,   '#071628');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawMoon();
  drawMountain();
  drawGround();
  drawLake();
  drawTrees();
  drawHouse();
  drawSnow();

  requestAnimationFrame(frame);
}

frame();
</script>
