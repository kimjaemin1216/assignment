<title>My Project Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --sky:#02091a;
  --silver:#a8c8e8;
  --ice:#c8e4f8;
  --moon:#eef2ff;
  --card-bg:rgba(6,22,50,0.62);
  --card-border:rgba(168,200,232,0.20);
  --muted:#6a9abf;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--sky);color:#ddeeff;font-family:'Noto Serif KR',serif;}
#bg{position:fixed;inset:0;z-index:0;}
#scene{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;}
.ui{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.hd{text-align:center;margin-bottom:38px;animation:fadeD 1.2s ease both;}
.hd h1{font-family:'Crimson Pro',serif;font-weight:300;font-style:italic;font-size:54px;letter-spacing:6px;color:var(--moon);text-shadow:0 0 35px rgba(180,220,255,.6),0 0 80px rgba(120,180,240,.28);}
.hd p{margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:7px;}
.grid{display:grid;grid-template-columns:repeat(4,220px);gap:20px;animation:fadeU 1.2s .28s ease both;}
.card{height:285px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:30px 22px 24px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:space-between;transition:transform .4s cubic-bezier(.23,1,.32,1),border-color .4s,box-shadow .4s;overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(145deg,rgba(180,220,255,.06) 0%,transparent 55%);}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(168,210,248,.5),transparent);border-radius:0 0 20px 20px;opacity:0;transition:opacity .4s;}
.card:hover{transform:translateY(-13px) scale(1.035);border-color:rgba(168,210,248,.48);box-shadow:0 22px 60px rgba(0,15,50,.75),0 0 32px rgba(100,170,230,.22),inset 0 1px 0 rgba(255,255,255,.07);}
.card:hover::after{opacity:1;}
.icon{font-size:46px;line-height:1;filter:drop-shadow(0 3px 12px rgba(0,0,0,.45));transition:transform .4s cubic-bezier(.23,1,.32,1);}
.card:hover .icon{transform:scale(1.15) translateY(-5px);}
.card-txt{text-align:center;}
.card-txt h2{font-size:17px;font-weight:600;color:var(--moon);margin-bottom:6px;letter-spacing:.5px;}
.card-txt p{font-size:12px;color:var(--muted);line-height:1.6;}
.btn{padding:9px 24px;background:transparent;border:1px solid rgba(168,210,248,.30);border-radius:50px;color:var(--silver);font-size:12px;font-family:'Noto Serif KR',serif;letter-spacing:2px;cursor:pointer;transition:all .3s;white-space:nowrap;}
.btn:hover,.card:hover .btn{background:rgba(168,210,248,.12);border-color:rgba(168,210,248,.65);color:var(--ice);box-shadow:0 0 20px rgba(100,180,240,.2);}
@keyframes fadeD{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:none}}
@keyframes fadeU{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@media(max-width:960px){.grid{grid-template-columns:repeat(2,210px);}}
@media(max-width:500px){.grid{grid-template-columns:1fr;width:86vw;}}
</style>
</head>

<div class="ui">

      <button class="btn">보러가기</button>
    </div>

<script>
function goTo(p){ window.location.href=p; }

const cvs=document.getElementById('bg'), ctx=cvs.getContext('2d');
function resize(){ cvs.width=window.innerWidth; cvs.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

const STARS=Array.from({length:130},()=>({
  x:Math.random(), y:Math.random()*.80,
  r:Math.random()*1.4+.3, a:Math.random(), da:(Math.random()-.5)*.007
}));
const FLAKES=Array.from({length:230},()=>({
  x:Math.random(), y:Math.random(),
  r:Math.random()*2.8+.5,
  speed:Math.random()*.00068+.00028,
  drift:(Math.random()-.5)*.00025,
  swing:Math.random()*Math.PI*2, ss:Math.random()*.017+.005,
  a:Math.random()*.58+.28
}));
function draw(){
  const W=cvs.width,H=cvs.height; ctx.clearRect(0,0,W,H);
  STARS.forEach(s=>{
    s.a+=s.da; if(s.a>1||s.a<.12)s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,225,255,${s.a.toFixed(2)})`; ctx.fill();
  });
  FLAKES.forEach(f=>{
    f.swing+=f.ss; f.y+=f.speed; f.x+=Math.sin(f.swing)*f.drift;
    if(f.y>1){f.y=-.02;f.x=Math.random();} if(f.x<0)f.x=1; if(f.x>1)f.x=0;
    ctx.beginPath(); ctx.arc(f.x*W,f.y*H,f.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,235,255,${f.a.toFixed(2)})`; ctx.fill();
  });
  requestAnimationFrame(draw);
} draw();

/* 산타: viewBox 1600×900, 그룹 전체폭≈700
   화면 상단(y=100~220)에서 왼→오 이동 */
const santaEl=document.getElementById('santa');
let sX=-750, sY=140, sT=0;
function animSanta(){
  sT+=.003; sX+=.85;
  santaEl.setAttribute('transform',`translate(${sX|0},${(sY+Math.sin(sT*1.8)*20)|0})`);
  if(sX>1800){ sX=-750; sY=90+Math.random()*110; }
  requestAnimationFrame(animSanta);
} animSanta();

/* 쿠키맨: 발 끝이 눈 위(y≈870)에 딱 맞게
   cm1 발끝 = translate_y + 52  → 870-52=818
   cm2 발끝 = translate_y + 48  → 870-48=822 */
const cm1El=document.getElementById('cm1'), cm2El=document.getElementById('cm2');
let c1={x:560,  y:818, dir:1,  t:0};
let c2={x:1050, y:822, dir:-1, t:Math.PI};
function animCookies(){
  c1.t+=.052; c2.t+=.044;
  c1.x+=.55*c1.dir; c2.x+=.46*c2.dir;
  if(c1.x>1380) c1.dir=-1; if(c1.x<380) c1.dir=1;
  if(c2.x>1270) c2.dir=-1; if(c2.x<570) c2.dir=1;
  const b1=Math.sin(c1.t*2)*4, b2=Math.sin(c2.t*2)*3.5;
  const by1=c1.y-Math.abs(Math.sin(c1.t*2))*5;
  const by2=c2.y-Math.abs(Math.sin(c2.t*2))*4.5;
  cm1El.setAttribute('transform',
    `translate(${c1.x|0},${by1|0}) ${c1.dir<0?'scale(-1,1)':''} rotate(${(b1*c1.dir*.5).toFixed(1)})`);
  cm2El.setAttribute('transform',
    `translate(${c2.x|0},${by2|0}) ${c2.dir<0?'scale(-1,1)':''} rotate(${(b2*c2.dir*.5).toFixed(1)})`);
  requestAnimationFrame(animCookies);
} animCookies();

const puffs=document.querySelectorAll('.sp'); let st=0;
function animSmoke(){
  st+=.013;
  puffs.forEach((p,i)=>{
    const d=Math.sin(st+i*1.2)*9, r=(st*.9+i*7)%48;
    p.setAttribute('transform',`translate(${d.toFixed(1)},${(-r).toFixed(1)})`);
    p.style.opacity=Math.max(0,.65-r/58).toFixed(2);
  });
  requestAnimationFrame(animSmoke);
} animSmoke();
</script>
